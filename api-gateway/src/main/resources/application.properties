spring.application.name=api-gateway
server.port=8080

# Routes — task-service
spring.cloud.gateway.server.webmvc.routes[0].id=task-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://task-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/tasks/**

# Routes — student-service
spring.cloud.gateway.server.webmvc.routes[1].id=student-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://student-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/students/**

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true

management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans

