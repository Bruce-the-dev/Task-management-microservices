<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks Dashboard</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 2rem;
            background-color: #f8f9fa;
        }

        .table-hover tbody tr:hover {
            background-color: #e9ecef;
        }

        .badge-overdue {
            background-color: #dc3545;
        }

        .badge-completed {
            background-color: #28a745;
        }

        .badge-pending {
            background-color: #ffc107;
            color: #212529;
        }
        .btn-sm {
            font-size: 0.85rem;
            padding: 0.25rem 0.5rem;
        }
    </style>
</head>
<body>
<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<div class="container">
    <h1 class="mb-4">Tasks Dashboard</h1>
    <div class="mb-3">
        <a href="/students/create" class="btn btn-primary">+ Add Student</a>
        <a href="/tasks/create" class="btn btn-success">+ Add Task</a>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Title</th>
            <th>Assigned Student</th>
            <!--            <th>Due Date</th>-->
            <!--            <th>Status</th>-->
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task, iterStat : ${tasks}">
            <td th:text="${iterStat.count}">1</td>
            <td th:text="${task.title}">Task Title</td>
            <td>
                    <span th:if="${task.studentId != null}">
                        <a th:href="@{/students/{id}(id=${task.studentId})}"
                           th:text="${studentMap[task.studentId] != null ? studentMap[task.studentId] : 'Unknown'}">Student Name</a>
                        <a th:href="@{/students/edit/{id}(id=${task.studentId})}"
                           class="btn btn-sm btn-outline-secondary ms-2">Edit</a>
                    </span>

                <span th:if="${task.studentId == null}">Unassigned</span>
            </td>
            <!--            <td th:text="${task.get('dueDate')}">2026-04-08</td>-->
            <!--            <td>-->
            <!--                    <span th:switch="${task.get('status')}">-->
            <!--                        <span th:case="'COMPLETED'" class="badge badge-completed">Completed</span>-->
            <!--                        <span th:case="'PENDING'" class="badge badge-pending">Pending</span>-->
            <!--                        <span th:case="'OVERDUE'" class="badge badge-overdue">Overdue</span>-->
            <!--                        <span th:case="*">Unknown</span>-->
            <!--                    </span>-->
            <!--            </td>-->
            <td>
                <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-sm btn-warning">
                    Edit
                </a>

                <!-- Replace with this -->
                <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post" style="display:inline;">
                    <button type="submit"
                            class="btn btn-sm btn-danger ms-2"
                            onclick="return confirm('Are you sure you want to delete this task?');">
                        Delete Task
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
