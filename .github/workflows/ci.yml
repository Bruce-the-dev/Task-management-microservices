name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test student-service
        run: |
          cd student-service
          mvn clean verify

      - name: Build and test task-service
        run: |
          cd task-service
          mvn clean verify

      - name: Build and test frontend-service
        run: |
          cd frontend-service
          mvn clean verify

      - name: Build and test api-gateway
        run: |
          cd api-gateway
          mvn clean verify

      - name: Build and test eureka-server
        run: |
          cd eureka-server
          mvn clean verify

  push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Package all services
        run: |
          cd student-service && mvn clean package -DskipTests && cd ..
          cd task-service && mvn clean package -DskipTests && cd ..
          cd frontend-service && mvn clean package -DskipTests && cd ..
          cd api-gateway && mvn clean package -DskipTests && cd ..
          cd eureka-server && mvn clean package -DskipTests && cd ..

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_BUILDKIT: "0"
        run: |
          docker build -t "${DOCKER_USER}/student-service:latest" ./student-service
          docker build -t "${DOCKER_USER}/task-service:latest" ./task-service
          docker build -t "${DOCKER_USER}/frontend-service:latest" ./frontend-service
          docker build -t "${DOCKER_USER}/api-gateway:latest" ./api-gateway
          docker build -t "${DOCKER_USER}/eureka-server:latest" ./eureka-server
          docker push "${DOCKER_USER}/student-service:latest"
          docker push "${DOCKER_USER}/task-service:latest"
          docker push "${DOCKER_USER}/frontend-service:latest"
          docker push "${DOCKER_USER}/api-gateway:latest"
          docker push "${DOCKER_USER}/eureka-server:latest"