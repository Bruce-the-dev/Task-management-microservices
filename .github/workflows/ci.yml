name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test student-service
        run: |
          cd student-service
          mvn clean verify

      - name: Build and test task-service
        run: |
          cd task-service
          mvn clean verify

      - name: Build and test frontend-service
        run: |
          cd frontend-service
          mvn clean verify

      - name: Build and test api-gateway
        run: |
          cd api-gateway
          mvn clean verify

      - name: Build and test eureka-server
        run: |
          cd eureka-server
          mvn clean verify
